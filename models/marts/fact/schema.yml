version: 2
models:
  - name: fact_order_items
    description: "Fact table for orders data"
    columns:
      - name: order_item_id
        tests:
        - not_null
        - unique
      - name: user_id
        tests:
        - not_null
        - relationships:
            to: ref('dim_users')
            field: user_id
      - name: product_id
        tests:
        - not_null
        - relationships:
            to: ref('dim_products')
            field: product_id
      - name: order_date
        tests:
        - not_null
        - relationships:
            to: ref('dim_date')
            field: date_day